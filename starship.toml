format = """
$time\
$directory\
$git_branch\
$git_commit\
$git_status\
$git_state\
$deno\
$nodejs\
$lua\
$golang\
$rust\
$python\
$shlvl\
$jobs\
$character"""

add_newline = false

[directory]
format = "\\[ [$read_only]($read_only_style)[$path]($style) \\]"
read_only = "🔒 "
style = "white"
truncation_length = 0

[git_branch]
style = "white"
symbol = ""
format = ' [$symbol $branch(:$remote_branch)]($style)'

[git_status]
conflicted = " "
ahead = " ${count} "
behind = " ${count} "
diverged = "  ${ahead_count}  ${behind_count} "
untracked = " ${count} "
stashed = " "
modified = " ${count} "
staged = " ${count} "
renamed = " ${count} "
deleted = " ${count} "
style = "white"
format = " $all_status$ahead_behind"

[python]
format = "[${pyenv_prefix}${version}( \\($virtualenv\\))]($style) "

[golang]
format = "- [go@$version]($style) "
version_format = "$raw"

[deno]
format = "- $symbol[$version](green) "
style = "green"
version_format = "${raw}"

[nodejs]
detect_extensions = ["mjs", "cjs"]
detect_files = ['package.json', '.node-version']
format = "- [node@$version]($style) "
style = "green"

[lua]
format = '- [lua@$version](blue) '

[rust]
format = "- [rust@$version]($style) "

[shlvl]
disabled = false
style = "bright-blue"
format = "\\[ [$shlvl]($style) \\] "

[character]
error_symbol = " [# ](white)"
success_symbol = " [# ](white)"
